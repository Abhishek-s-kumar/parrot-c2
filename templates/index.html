<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Beacon SOC Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --danger-color: #f85149;
            --success-color: #3fb950;
            --border-color: #30363d;
            --header-bg: #010409;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow-x: hidden;
        }

        .navbar {
            background-color: var(--header-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .container {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .grid-main {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .col-8 {
            grid-column: span 8;
        }

        .col-4 {
            grid-column: span 4;
        }

        .col-6 {
            grid-column: span 6;
        }

        .col-12 {
            grid-column: span 12;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #f0f6fc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: #8b949e;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #21262d;
        }

        .btn {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .bg-danger {
            background: rgba(248, 81, 73, 0.15);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .bg-success {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .sidebar-item {
            padding: 0.75rem;
            border-bottom: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
        }

        .sidebar-item:last-child {
            border-bottom: none;
        }

        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <h1>BeaconEye <span style="color: var(--accent-color)">C2 SOC</span></h1>
        <div id="system-status" class="status-badge bg-success">CORE ENGINE ONLINE</div>
    </div>

    <div class="container">
        <div class="grid-main">
            <!-- Top Row Metrics -->
            <div class="card col-4">
                <div class="card-title">Detection Score Trends</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="card col-4">
                <div class="card-title">Interval Distribution (s)</div>
                <div class="chart-container">
                    <canvas id="intervalChart"></canvas>
                </div>
            </div>
            <div class="card col-4">
                <div class="card-title">Top Malicious Hosts</div>
                <div class="chart-container">
                    <canvas id="hostChart"></canvas>
                </div>
            </div>

            <!-- Main Results Table -->
            <div class="card col-8">
                <div class="card-header">
                    <div class="card-title">Detection Forensics</div>
                    <button class="btn" onclick="triggerAnalyze()">Deep Scan</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Host</th>
                            <th>P-Score</th>
                            <th>Interval</th>
                            <th>Samples</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <tr>
                            <td colspan="5" style="text-align: center">Initializing forensics...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Alerts Sidebar -->
            <div class="card col-4">
                <div class="card-title">Critical Alerts</div>
                <div id="alerts-container"></div>
                <div class="card-title" style="margin-top:2rem">Active Systems</div>
                <div id="systems-container"></div>
            </div>
        </div>
    </div>

    <script>
        let trendChart, intervalChart, hostChart;

        function initCharts() {
            const ctxT = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctxT, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Detections', data: [], borderColor: '#58a6ff', tension: 0.3 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const ctxI = document.getElementById('intervalChart').getContext('2d');
            intervalChart = new Chart(ctxI, {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Hosts', data: [], backgroundColor: '#3fb950' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const ctxH = document.getElementById('hostChart').getContext('2d');
            hostChart = new Chart(ctxH, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#f85149', '#db6d28', '#d29922', '#3fb950', '#58a6ff'] }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#c9d1d9', boxWidth: 10 } } } }
            });
        }

        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                // Update Trend
                trendChart.data.labels = data.trends.map(t => new Date(t.hour).getHours() + ':00');
                trendChart.data.datasets[0].data = data.trends.map(t => t.count);
                trendChart.update();

                // Update Intervals
                intervalChart.data.labels = data.intervals.map(i => i.bucket + 's');
                intervalChart.data.datasets[0].data = data.intervals.map(i => i.count);
                intervalChart.update();

                // Update Hosts
                hostChart.data.labels = data.top_hosts.map(h => h.host.substring(0, 15));
                hostChart.data.datasets[0].data = data.top_hosts.map(h => h.p_score);
                hostChart.update();

            } catch (e) { console.error("Stats fail", e); }
        }

        async function triggerAnalyze() {
            const body = document.getElementById('results-body');
            body.innerHTML = '<tr><td colspan="5" style="text-align: center">Analyzing traffic patterns...</td></tr>';
            try {
                const res = await fetch('/api/analyze');
                const data = await res.json();
                body.innerHTML = '';
                data.results.forEach(r => {
                    const tr = document.createElement('tr');
                    const interval = r.beacon_interval_estimate ? r.beacon_interval_estimate.toFixed(1) + 's' : 'N/A';
                    tr.innerHTML = `
                        <td style="color: var(--accent-color)">${r.display_host || r.host}</td>
                        <td>${r.p_score.toFixed(3)}</td>
                        <td>${interval}</td>
                        <td>${r.samples}</td>
                        <td><span class="status-badge ${r.detected ? 'bg-danger' : 'bg-success'}">${r.detected ? 'MALICIOUS' : 'CLEAN'}</span></td>
                    `;
                    body.appendChild(tr);
                });
                updateStats();
            } catch (e) { body.innerHTML = '<tr><td colspan="5">Scan failed</td></tr>'; }
        }

        async function fetchAlerts() {
            const container = document.getElementById('alerts-container');
            const res = await fetch('/api/alerts');
            const data = await res.json();
            container.innerHTML = data.alerts.length ? '' : '<div style="color: #6e7681">No threats active</div>';
            data.alerts.slice(0, 5).forEach(a => {
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.innerHTML = `<span style="color: var(--danger-color)">!</span> <span>${a.display_host || a.host}</span> <span style="font-size:0.8rem">${a.p_score.toFixed(2)}</span>`;
                container.appendChild(div);
            });
        }

        async function fetchSystems() {
            const container = document.getElementById('systems-container');
            const res = await fetch('/api/online_systems');
            const data = await res.json();
            container.innerHTML = '';
            data.systems.slice(0, 8).forEach(s => {
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.innerHTML = `<span style="color: var(--success-color)">●</span> <span>${s.display_host}</span>`;
                container.appendChild(div);
            });
        }

        initCharts();
        triggerAnalyze();
        setInterval(() => { fetchAlerts(); fetchSystems(); updateStats(); }, 30000);
        fetchAlerts(); fetchSystems();
    </script>
</body>

</html>
